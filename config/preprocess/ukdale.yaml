paths:
  data_dir: "dataset_preprocess/UK_DALE"
  save_path: "dataset_preprocess/created_data/UK_DALE"
  naming:
    train: "{appliance}_training.csv"
    val: "{appliance}_validation.csv"
    test: "{appliance}_test.csv"

global_params:
  aggregate_mean: 522
  aggregate_std: 814
  # Timezone for processing (Options: "UTC", "Europe/London")
  timezone: "Europe/London"
  
  # Timeframe filtering (e.g., '2013-02-17' or '2013-02-17 07:00:00')
  # Example for Week 30: '2013-07-22 07:00:00' to '2013-07-29 07:00:00'
  start_time: '2013-07-22 00:00:00'
  end_time: '2013-07-29 00:00:00'



  sample_seconds: 6
  validation_percent: 20
  testing_percent: 20
  appliances_to_process: ["kettle", "microwave", "fridge", "dishwasher", "washingmachine"]

